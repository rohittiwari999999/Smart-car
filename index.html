<!DOCTYPE html>
<html>
<head>
    <title>Smart Car Pro Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 20px; }
        .grid { display: grid; grid-template-columns: 80px 80px 80px; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn { width: 80px; height: 80px; font-size: 16px; border-radius: 15px; border: none; background: #00ff88; color: black; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        .btn:active { background: #ff0055; color: white; }
        .center { grid-column: 2; }
        .slider-container { margin-top: 40px; padding: 20px; }
        input[type=range] { width: 80%; max-width: 300px; height: 15px; border-radius: 5px; background: #444; outline: none; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; border-radius: 50%; background: #00ff88; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚗 Smart Car Control</h1>
    
    <div class="grid">
        <button class="btn center" onmousedown="callBlynk('V0',1)" onmouseup="callBlynk('V0',0)" ontouchstart="callBlynk('V0',1)" ontouchend="callBlynk('V0',0)">UP</button>
        <button class="btn" onmousedown="callBlynk('V2',1)" onmouseup="callBlynk('V2',0)" ontouchstart="callBlynk('V2',1)" ontouchend="callBlynk('V2',0)">LEFT</button>
        <button class="btn" style="background:#555" onclick="location.reload()">REFRESH</button>
        <button class="btn" onmousedown="callBlynk('V3',1)" onmouseup="callBlynk('V3',0)" ontouchstart="callBlynk('V3',1)" ontouchend="callBlynk('V3',0)">RIGHT</button>
        <button class="btn center" onmousedown="callBlynk('V1',1)" onmouseup="callBlynk('V1',0)" ontouchstart="callBlynk('V1',1)" ontouchend="callBlynk('V1',0)">DOWN</button>
    </div>

    <div class="slider-container">
        <h3>⚡ Speed Control: <span id="speedValue">200</span></h3>
        <input type="range" min="0" max="255" value="200" id="speedSlider" oninput="updateSpeed(this.value)">
    </div>

    <script>
        const token = "bokIXsMkFOiw6gNLsEU2jA_zEindizmm";
        
        function callBlynk(pin, val) {
            fetch(`https://blynk.cloud/external/api/update?token=${token}&${pin}=${val}`);
        }

        function updateSpeed(val) {
            document.getElementById('speedValue').innerText = val;
            callBlynk('V5', val); // V5 slider ke liye
        }
    </script>
</body>
</html>
